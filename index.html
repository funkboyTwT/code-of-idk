<!DOCTYPE html>
<html>
<head>
    <style>
        /* 1. 背景灰色 */
        body { background-color: #f0f0f0; font-family: sans-serif; cursor: pointer; }
        /* 2. 边框黑色 */
        .box { border: 2px solid black; background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: 20px auto; box-shadow: 5px 5px 10px rgba(0,0,0,0.1); }
        /* 3. 文字位置与颜色 */
        .c { color: red; text-align: center; }
        .r { color: blue; text-align: right; }
    </style>
</head>
<body>
    <div class="box c"><h1>居中红字</h1></div>
    <div class="box r"><p>靠右蓝字</p></div>
    <script>
        // 点击任意处全屏
        document.addEventListener('click', () => document.documentElement.requestFullscreen?.());
    </script>
</body>
</html>

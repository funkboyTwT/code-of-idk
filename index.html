<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>终极灰调动效系统</title>
    <style>
        /* 1. 基础变量：支持一键切换深浅色调 */
        :root {
            --bg-main: #f5f5f5;
            --bg-card: #e8e8e8;
            --border-color: #a0a0a0;
            --border-hover: #555555;
            --text-color: #333333;
            --text-sub: #555555;
            --box-shadow: rgba(0, 0, 0, 0.04);
        }

        /* 暗黑/深灰模式 */
        [data-theme="dark"] {
            --bg-main: #222222;
            --bg-card: #333333;
            --border-color: #555555;
            --border-hover: #aaaaaa;
            --text-color: #eeeeee;
            --text-sub: #cccccc;
            --box-shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            background-color: var(--bg-main);  
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            cursor: pointer;
            margin: 0;
            transition: background-color 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        /* 烟花 Canvas 画布：全屏覆盖且不阻挡点击 */
        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* 顶部控制栏 */
        .control-bar {
            max-width: 600px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }
        
        .clock {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-sub);
            border: 2px solid var(--border-color);
            padding: 5px 15px;
            border-radius: 20px;
            background: var(--bg-card);
        }

        /* 主体布局包裹层 */
        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* 卡片样式（灰色粗边框 + Hover 悬浮动画） */
        .card {
            background-color: var(--bg-card);  
            border: 4px solid var(--border-color);  
            padding: 40px 25px;
            border-radius: 12px;
            box-shadow: 4px 4px 12px var(--box-shadow);
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
        }

        .card:hover {
            border-color: var(--border-hover);      
            transform: translateY(-5px); 
            box-shadow: 6px 12px 20px var(--box-shadow); 
        }

        .important-title { text-align: center; margin-top: 0; }

        .gray-button {
            padding: 12px 24px;
            background-color: var(--text-color);  
            color: var(--bg-main);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s, transform 0.1s;
        }
        .gray-button:hover { opacity: 0.8; }
        .gray-button:active { transform: scale(0.95); } 
    </style>
</head>
<body>

    <!-- 烟花背景画布 -->
    <canvas id="fireworksCanvas"></canvas>

    <!-- 顶部时间与换肤 -->
    <div class="control-bar" onclick="event.stopPropagation();">
        <div class="clock" id="liveClock">当前时间：00:00:00</div>
        <button class="gray-button" id="themeBtn" style="padding: 6px 15px; font-size:14px;">切换深色模式</button>
    </div>

    <!-- 主体布局 -->
    <div class="container">
        <div class="card">
            <h1 class="important-title">终极灰调艺术系统</h1>
            <p style="text-align: center; font-size: 14px; line-height: 1.6; color: var(--text-sub);">
                🎆 <b>特效说明</b>：点击任意空白处可<b>进入全屏</b>，同时在鼠标点击位置绽放<b>灰色像素烟花</b>！右上角切换模式时将伴随<b>科技感低沉音效</b>。
            </p>
        </div>
    </div>

    <script>
        // === 1. 全屏控制与烟花触发 ===
        document.addEventListener('click', function(e) {
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) { docElm.requestFullscreen(); }
            else if (docElm.webkitRequestFullScreen) { docElm.webkitRequestFullScreen(); }
            
            // 触发点击处的像素烟花
            createFirework(e.clientX, e.clientY);
        });

        // === 2. 纯代码科技音效合成器 ===
        function playTechSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(150, ctx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.15); 
                
                gain.gain.setValueAtTime(0.3, ctx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15); 
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch(err) { console.log("音频播放需要用户先行交互。"); }
        }

        // === 3. 基础画布与烟花渲染系统 ===
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createFirework(x, y) {
            const particleCount = 35;
            // 依据深色模式状态自适应调整烟花的灰度区间
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const colorRange = isDark ? {min: 150, max: 220} : {min: 80, max: 150}; 

            for (let i = 0; i < particleCount; i++) {
                const grayValue = Math.floor(Math.random() * (colorRange.max - colorRange.min) + colorRange.min);
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 2;
                
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 3 + 2, 
                    alpha: 1,
                    decay: Math.random() * 0.02 + 0.015,
                    color: `rgba(${grayValue}, ${grayValue}, ${grayValue}, `
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.12; // 重力模拟
                p.alpha -= p.decay;
                
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                ctx.fillStyle = p.color + p.alpha + ')';
                ctx.fillRect(p.x, p.y, p.size, p.size); // 绘制正方形像素颗粒
            }
            requestAnimationFrame(animate);
        }
        animate();

        // === 4. 时钟功能 ===
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').innerText = "当前时间：" + now.toTimeString().split(' ');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // === 5. 深浅模式切换 ===
        const themeBtn = document.getElementById('themeBtn');
        themeBtn.addEventListener('click', () => {
            playTechSound();
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.innerText = "切换深色模式";
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.innerText = "切换浅色模式";
            }
        });
    </script>
</body>
</html>
